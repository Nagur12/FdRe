<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <h1>Employee Directory</h1>
    <button id="addEmployeeBtn" class="btn primary">+ Add Employee</button>
  </header>

  <main class="container grid">
    <!-- Table 1: Employee Info -->
    <section class="card">
      <h2>Employee Info</h2>
      <div class="table-wrapper">
        <table id="employeeInfoTable">
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
            </tr>
          </thead>
          <tbody>
            <!-- Sample rows -->
            <tr>
              <td>EMP001</td>
              <td>Jane Doe</td>
            </tr>
            <tr>
              <td>EMP002</td>
              <td>John Smith</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Table 2: Contact Info -->
    <section class="card">
      <h2>Contact Info</h2>
      <div class="table-wrapper">
        <table id="contactInfoTable">
          <thead>
            <tr>
              <th>Email</th>
              <th>Contact</th>
            </tr>
          </thead>
          <tbody>
            <!-- Sample rows -->
            <tr>
              <td>jane.doe@example.com</td>
              <td>+91 98765 43210</td>
            </tr>
            <tr>
              <td>john.smith@example.com</td>
              <td>+91 91234 56789</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Add Employee Modal -->
  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Employee</h3>
        <button class="icon-btn" id="closeModalBtn" aria-label="Close dialog">✕</button>
      </div>
      <form id="employeeForm" class="modal-body">
        <div class="form-row">
          <label for="empId">Employee ID <span class="req">*</span></label>
          <input type="text" id="empId" name="empId" placeholder="e.g., EMP003" required />
        </div>
        <div class="form-row">
          <label for="empName">Name <span class="req">*</span></label>
          <input type="text" id="empName" name="empName" placeholder="e.g., Priya Nair" required />
        </div>
        <div class="form-row">
          <label for="empEmail">Email <span class="req">*</span></label>
          <input type="email" id="empEmail" name="empEmail" placeholder="e.g., priya.nair@example.com" required />
        </div>
        <div class="form-row">
          <label for="empContact">Contact <span class="req">*</span></label>
          <input type="tel" id="empContact" name="empContact" placeholder="e.g., +91 90000 12345" required />
        </div>

        <div class="modal-footer">
          <button type="button" class="btn" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn primary">Add</button>
        </div>
        <p class="hint">All fields are required. Email format will be validated.</p>
      </form>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
``
